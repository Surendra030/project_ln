name: Download Tesseract and Push to Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:  # This allows manual trigger of the workflow

jobs:
  download_tesseract:
    runs-on: ubuntu-latest  # Runs the job on Ubuntu

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Install Tesseract
        run: |
          sudo apt update
          sudo apt install -y tesseract-ocr

      - name: Verify Tesseract installation
        run: tesseract --version

      - name: Commit and push changes
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Add all changes and commit
          git add -A
          git commit -m "Added Tesseract to the repository"
          
          # Push changes to the repository
          git push origin main
