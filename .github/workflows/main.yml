name: Download and Save Tesseract

on:
  workflow_dispatch:  # This triggers the workflow manually

jobs:
  download-tesseract:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential automake autoconf libtool pkg-config
        sudo apt install -y wget

    - name: Download and build Tesseract
      run: |
        # Create a directory to store Tesseract
        mkdir tesseract-build
        cd tesseract-build

        # Download the Tesseract source code
        wget https://github.com/tesseract-ocr/tesseract/archive/refs/tags/5.3.0.tar.gz

        # Extract the source code
        tar -xvzf 5.3.0.tar.gz
        cd tesseract-5.3.0

        # Build and install Tesseract
        ./autogen.sh
        ./configure
        make
        sudo make install

        # Copy the binaries to a folder in the repo
        mkdir -p ../tesseract-files
        cp -r /usr/local/bin/tesseract ../tesseract-files/

    - name: Commit and push Tesseract binaries to repo
      run: |
        # Configure Git user
        git config --global user.name "Surendra030"
        git config --global user.email "surendrababun030@gmail.com"
        
        # Add, commit, and push the changes
        git add tesseract-files/
        git commit -m "Add Tesseract binaries to the repo"
        git push origin main
