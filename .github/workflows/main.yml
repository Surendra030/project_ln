name: Download Tesseract and Push to Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:  # This allows manual trigger of the workflow

jobs:
  download_tesseract:
    runs-on: ubuntu-latest  # Runs the job on Ubuntu

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Install Tesseract
        run: |
          sudo apt update
          sudo apt install -y tesseract-ocr

      - name: Verify Tesseract installation
        run: |
          tesseract --version
          tesseract --version > tesseract_version.txt  # Save Tesseract version to a file

      - name: Commit and push changes
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Add the new tesseract_version.txt file and commit
          git add tesseract_version.txt
          git commit -m "Added Tesseract version log file"
          
          # Push changes using GITHUB_TOKEN
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
