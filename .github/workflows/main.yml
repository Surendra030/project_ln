name: Download Tesseract and Push to Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:  # This allows manual trigger of the workflow

jobs:
  download_tesseract:
    runs-on: ubuntu-latest  # Runs the job on Ubuntu

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2

      - name: Install Tesseract
        run: |
          sudo apt update
          sudo apt install -y tesseract-ocr

      - name: Verify Tesseract installation
        run: |
          tesseract --version
          tesseract --version > tesseract_version.txt  # Save Tesseract version to a file

      - name: Create Tesseract-related files folder
        run: |
          mkdir tesseract_files
          # Copy Tesseract files (this is just an example)
          cp $(which tesseract) tesseract_files/tesseract_executable
          cp /usr/share/tesseract-ocr/tessdata/* tesseract_files/tessdata/
          # You can copy any other relevant files, adjust the paths as needed

      - name: Commit and push changes
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Add the new tesseract files and commit
          git add tesseract_version.txt tesseract_files/
          git commit -m "Added Tesseract installation files and version log"
          
          # Push changes using GITHUB_TOKEN
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
